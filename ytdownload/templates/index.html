<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader (Django & HTML)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input[type="url"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #b80710;
        }
        .error-msg {
            color: red;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>youtube downloader</h2>
    <p>Paste a YouTube link below to download the best quality video track directly.</p>
    
    <!-- Standard HTML Form submitting a POST action back to our home path -->
    <form method="POST" action="">
        {% csrf_token %}
        <label for="url">Video URL:</label>
        <input type="url" id="url" name="video_url" placeholder="https://www.youtube.com/watch?v=..." required>
        
        <button type="submit">Download Video File</button>
    </form>

    {% if error %}
        <p class="error-msg">{{ error }}</p>
    {% endif %}
</div>

</body>
</html>
