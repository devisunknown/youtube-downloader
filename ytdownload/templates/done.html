<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Complete</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            text-align: center;
            padding: 48px 40px;
            background: #1a1a1a;
            border-radius: 16px;
            border: 1px solid #2a2a2a;
            max-width: 420px;
            width: 90%;
        }

        .icon {
            width: 72px;
            height: 72px;
            background: #1db954;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .icon svg {
            width: 36px;
            height: 36px;
            stroke: #fff;
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        p {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        a {
            display: inline-block;
            background: #ff0000;
            color: #fff;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        a:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <h1>Download Complete</h1>
        <p>Your video has been downloaded successfully.<br>Check your downloads folder.</p>
        <a href="/">Download Another</a>
    </div>
</body>
</html>
